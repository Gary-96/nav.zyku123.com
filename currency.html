<!DOCTYPE html>
<html lang="zh">
<head>
    <meta charset="utf-8">
    <meta http-equiv="X-UA-Compatible" content="IE=edge">
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta name="author" content="viggo" />
    <title>实时汇率转换器 - 优创资源导航</title>
    <link rel="shortcut icon" href="./assets/images/favicon.webp">
    <link rel="stylesheet" href="http://fonts.googleapis.com/css?family=Arimo:400,700,400italic">
    <link rel="stylesheet" href="./assets/css/fonts/fontawesome/css/font-awesome.min.css">
    <link rel="stylesheet" href="./assets/css/bootstrap.css">
<style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Arimo', Arial, sans-serif;
            background: linear-gradient(135deg, #1e3c72 0%, #2a5298 50%, #7e22ce 100%);
            min-height: 100vh;
            padding: 0;
            margin: 0;
        }

        /* 顶部导航栏 */
        .top-nav {
            background: rgba(255, 255, 255, 0.1);
            backdrop-filter: blur(10px);
            padding: 15px 30px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            box-shadow: 0 2px 20px rgba(0,0,0,0.1);
            position: fixed;
            top: 0;
            left: 0;
            right: 0;
            z-index: 1000;
        }

        .home-button {
            display: inline-flex;
            align-items: center;
            gap: 10px;
            padding: 10px 25px;
            background: rgba(255, 255, 255, 0.2);
            color: #fff;
            text-decoration: none;
            border-radius: 25px;
            font-weight: 600;
            transition: all 0.3s;
            border: 2px solid rgba(255, 255, 255, 0.3);
        }

        .home-button:hover {
            background: rgba(255, 255, 255, 0.3);
            transform: translateY(-2px);
            box-shadow: 0 5px 15px rgba(0,0,0,0.2);
        }

        .home-button i {
            font-size: 18px;
        }

        .nav-title {
            color: #fff;
            font-size: 24px;
            font-weight: bold;
        }

        /* 主容器 */
        .currency-container {
            max-width: 1200px;
            margin: 40px auto;
            padding: 40px 20px;
            padding-top: 100px;
            border-top: 1px solid #eee;
        }

        .converter-header {
            text-align: center;
            color: #fff;
            margin-bottom: 40px;
        }

        .converter-header h1 {
            font-size: 48px;
            font-weight: bold;
            margin-bottom: 10px;
            text-shadow: 0 2px 10px rgba(0,0,0,0.2);
        }

        .converter-header p {
            font-size: 18px;
            opacity: 0.9;
        }

        /* 货币网格 */
        .currency-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(280px, 1fr));
            gap: 20px;
            margin-top: 30px;
        }

        .currency-card {
            background: rgba(255, 255, 255, 0.95);
            border-radius: 15px;
            padding: 25px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.2);
            transition: all 0.3s;
        }

        .currency-card:hover {
            transform: translateY(-5px);
            box-shadow: 0 15px 40px rgba(0,0,0,0.3);
        }

        .currency-header {
            display: flex;
            align-items: center;
            gap: 12px;
            margin-bottom: 15px;
        }

        .currency-flag {
            width: 32px;
            height: 32px;
            border-radius: 50%;
            object-fit: cover;
        }

        .currency-name {
            font-size: 16px;
            font-weight: 600;
            color: #333;
        }

        .currency-code {
            font-size: 14px;
            color: #666;
            margin-left: auto;
            background: #f0f0f0;
            padding: 4px 12px;
            border-radius: 12px;
        }

        .currency-input {
            width: 100%;
            padding: 15px;
            border: 2px solid #e0e0e0;
            border-radius: 10px;
            font-size: 24px;
            font-weight: 600;
            color: #333;
            transition: all 0.3s;
        }

        .currency-input:focus {
            outline: none;
            border-color: #667eea;
            box-shadow: 0 0 0 3px rgba(102,126,234,0.1);
        }

        .update-info {
            text-align: center;
            color: rgba(255,255,255,0.8);
            font-size: 14px;
            margin-top: 30px;
            padding: 15px;
            background: rgba(255,255,255,0.1);
            border-radius: 10px;
        }

        .base-currency-selector {
            text-align: center;
            margin-bottom: 30px;
        }

        .base-currency-selector label {
            color: #fff;
            font-size: 16px;
            margin-right: 15px;
            font-weight: 600;
        }

        .base-currency-selector select {
            padding: 10px 20px;
            border-radius: 10px;
            border: 2px solid rgba(255,255,255,0.3);
            background: rgba(255,255,255,0.2);
            color: #fff;
            font-size: 16px;
            font-weight: 600;
            cursor: pointer;
        }

        .base-currency-selector select option {
            background: #2a5298;
            color: #fff;
        }
</style>
</head>
<body>
    <!-- 顶部导航 -->
    <div class="top-nav">
        <a href="index.html" class="home-button">
            <i class="fa fa-home"></i>
            <span>返回首页</span>
        </a>
        <div class="nav-title">实时汇率转换器</div>
        <div style="width: 140px;"></div>
    </div>

    <!-- 主内容 -->
    <div class="currency-container">
        <div class="converter-header">
            <h1>全球货币实时转换</h1>
            <p>支持多种主流货币，汇率实时更新，输入任意金额自动联动换算</p>
        </div>

        <div class="base-currency-selector">
            <label>基准货币：</label>
            <select id="base-currency">
                <option value="CNY" selected>CNY - 人民币</option>
                <option value="USD">USD - 美元</option>
                <option value="EUR">EUR - 欧元</option>
                <option value="JPY">JPY - 日元</option>
                <option value="GBP">GBP - 英镑</option>
                <option value="HKD">HKD - 港币</option>
                <option value="THB">THB - 泰铢</option>
                <option value="MYR">MYR - 马来西亚林吉特</option>
            </select>
        </div>

        <div class="currency-grid" id="currency-grid">
            <!-- 货币卡片将通过 JavaScript 动态生成 -->
        </div>

        <div class="update-info" id="update-info">
            汇率更新时间：加载中...
        </div>
    </div>

    <script>
    const currencies = {
        'USD': { name: '美元', flag: 'us' },
        'EUR': { name: '欧元', flag: 'eu' },
        'CNY': { name: '人民币', flag: 'cn' },
        'JPY': { name: '日元', flag: 'jp' },
        'GBP': { name: '英镑', flag: 'gb' },
        'HKD': { name: '港币', flag: 'hk' },
        'THB': { name: '泰铢', flag: 'th' },
        'MYR': { name: '马来西亚林吉特', flag: 'my' }
    };

    let exchangeRates = {};
    let baseCurrency = 'CNY';
    let isUpdating = false;

    // 获取汇率
    async function fetchExchangeRates(base) {
        try {
            const response = await fetch(`https://api.exchangerate-api.com/v4/latest/${base}`);
            const data = await response.json();
            exchangeRates = data.rates;
            
            const updateDate = new Date(data.time_last_updated * 1000);
            document.getElementById('update-info').textContent = 
                `汇率更新时间：${updateDate.toLocaleString('zh-CN')} | 基准货币：${base}`;
            
            return data.rates;
        } catch (error) {
            console.error('获取汇率失败:', error);
            document.getElementById('update-info').textContent = '汇率获取失败，请稍后重试';
            return null;
        }
    }

    // 创建货币卡片
    function createCurrencyCards() {
        const grid = document.getElementById('currency-grid');
        grid.innerHTML = '';

        Object.keys(currencies).forEach(code => {
            const card = document.createElement('div');
            card.className = 'currency-card';
            card.innerHTML = `
                <div class="currency-header">
                    <img src="https://flagcdn.com/w40/${currencies[code].flag}.webp" 
                         alt="${code}" 
                         class="currency-flag">
                    <span class="currency-name">${currencies[code].name}</span>
                    <span class="currency-code">${code}</span>
                </div>
                <input type="number" 
                       class="currency-input" 
                       id="input-${code}" 
                       placeholder="0.00"
                       step="0.01">
            `;
            grid.appendChild(card);

            // 添加输入事件监听
            const input = card.querySelector('.currency-input');
            input.addEventListener('input', function() {
                if (!isUpdating) {
                    updateAllCurrencies(code, parseFloat(this.value) || 0);
                }
            });
        });
    }

    // 更新所有货币
    function updateAllCurrencies(sourceCode, sourceAmount) {
        isUpdating = true;

        Object.keys(currencies).forEach(targetCode => {
            if (targetCode !== sourceCode) {
                const input = document.getElementById(`input-${targetCode}`);
                if (input) {
                    const rate = exchangeRates[targetCode] / exchangeRates[sourceCode];
                    const result = sourceAmount * rate;
                    input.value = result.toFixed(2);
                }
            }
        });

        isUpdating = false;
    }

    // 基准货币切换
    document.getElementById('base-currency').addEventListener('change', async function() {
        baseCurrency = this.value;
        await fetchExchangeRates(baseCurrency);
        
        // 如果有输入值，重新计算
        const firstInput = document.getElementById(`input-${baseCurrency}`);
        if (firstInput && firstInput.value) {
            updateAllCurrencies(baseCurrency, parseFloat(firstInput.value) || 0);
        }
    });

    // 初始化
    (async function() {
        createCurrencyCards();
        await fetchExchangeRates(baseCurrency);
        
        // 设置默认值
        const cnyInput = document.getElementById('input-CNY');
        if (cnyInput) {
            cnyInput.value = '100';
            updateAllCurrencies('CNY', 100);
        }
    })();
    </script>
</body>
</html>
